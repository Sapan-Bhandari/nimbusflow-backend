services:

  # -----------------------------------
  # PostgreSQL
  # -----------------------------------

  postgres:
    image: postgres:17
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nimbus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  # -----------------------------------
  # Discovery Server
  # -----------------------------------

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: discovery-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - nimbus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # -----------------------------------
  # API Gateway
  # -----------------------------------

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - nimbus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # -----------------------------------
  # Resume Service
  # -----------------------------------

  resume-service:
    build:
      context: .
      dockerfile: resume-service/Dockerfile
    container_name: resume-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - discovery-server
      - matcher-service
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MATCHER_SERVICE_URL: ${MATCHER_SERVICE_URL}
    networks:
      - nimbus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # -----------------------------------
  # Job Service
  # -----------------------------------

  job-service:
    build:
      context: .
      dockerfile: job-service/Dockerfile
    container_name: job-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - discovery-server
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - nimbus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # -----------------------------------
  # Matcher Service
  # -----------------------------------

  matcher-service:
    build:
      context: ./matcher-service
    container_name: matcher-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OLLAMA_URL: ${OLLAMA_URL}
    networks:
      - nimbus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
  # -----------------------------------
  # Auth Service
  # -----------------------------------

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    depends_on:
      - discovery-server
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - nimbus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # -----------------------------------
  # Frontend
  # -----------------------------------

  frontend:
    build:
      context: ../nimbusflow-frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - nimbus-network

# -----------------------------------
# Volumes
# -----------------------------------

volumes:
  postgres_data:

# -----------------------------------
# Networks
# -----------------------------------

networks:
  nimbus-network: