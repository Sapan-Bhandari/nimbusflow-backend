apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nimbusflow

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:

        - name: frontend

          image: sapan18/nimbusflow-frontend:v4

          ports:
            - containerPort: 80