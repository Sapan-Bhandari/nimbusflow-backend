apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: nimbusflow

spec:
  replicas: 1

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:

        - name: auth-service

          image: sapan18/auth-service:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 8084

          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: nimbusflow-config
                  key: POSTGRES_DB

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: nimbusflow-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nimbusflow-secret
                  key: POSTGRES_PASSWORD

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nimbusflow-secret
                  key: JWT_SECRET

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084

            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084

            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5